<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Card de Produto</title>

  <style>
    .produto-card {
      background-color: #ffffff; 
      border: 1px solid #ccc;
      border-radius: 8px; 
      padding: 16px;
      margin-bottom: 12px; 

    .produto-card h3 {
      color: #003366; 
    }
  </style>

</head>
<body>

  <div class="produto-card">
    <h3>Amortecedor</h3>
    <p>Preço: R$ 330,00</p>
  </div>

  <div class="produto-card">
    <h3>Pastilha de Freio</h3>
    <p>Preço: R$ 100,00</p>
  </div>

</body>
</html>
